syntax = "proto3";

package microbench;

// All supported database backends
enum Backend {
    NEON = 0;
    DOLT = 1;
    KPG = 2;
    XATA = 3;
    FILE_COPY = 4;
}

// Type of benchmark operation to perform
enum OperationType {
    BRANCH = 0;
    READ = 1;
    CONNECT = 2;    
    INSERT = 3;
    UPDATE = 4;
    RANGE_UPDATE = 5;
    RANGE_READ = 6;
}

// Configuration for reusing an existing database
message ExistingDatabase {
    string branch_id = 1;        // Required: specific branch to connect to
    string neon_project_id = 2;  // Only required for Neon backend
}

// Configuration for creating database from SQL dump.
// The exact size of data varies, could be large or just an empty schema.
message SqlDump {
    string sql_dump_path = 1;      // Path to .sql file that can be imported
}

// Database setup configuration
message DatabaseSetup {
    string db_name = 1;
    bool cleanup = 2;  // Whether to delete database after completion
    
    // Either reuse an existing database or create from SQL dump.
    // The main difference is whether the data is hot or not.
    oneof source {
        ExistingDatabase existing_db = 3;
        SqlDump sql_dump = 4;
    }
}

// Range update configuration
message RangeUpdateConfig {
    int32 range_size = 1;  // Number of rows per range operation
}

// Shape of branch topology for Nth operation setup
enum BranchShape {
    SPINE = 0;    // Linear chain: main -> b1 -> b2 -> ... -> bN
    FAN_OUT = 1;  // All branches from root: main -> b1, main -> b2, ...
    BUSHY = 2;    // Random parent: each branch from a random existing branch
}

// Configuration for pre-benchmark setup (used with NthOperationBenchmark)
message BenchmarkSetup {
    int32 num_branches = 1;        // Number of branches to create during setup
    BranchShape branch_shape = 2;  // Topology shape for branch creation
    int32 inserts_per_branch = 3;  // Number of data inserts per branch during setup
    int32 updates_per_branch = 4;  // Number of updates per branch during setup
    int32 deletes_per_branch = 5;  // Number of deletes per branch during setup
}

// Configuration for measuring the Nth operation deterministically
message NthOperationBenchmark {
    OperationType operation = 1;   // The specific operation to measure (BRANCH, READ, INSERT, UPDATE, RANGE_UPDATE)
    BenchmarkSetup setup = 2;      // Setup configuration for creating state before measurement
    int32 num_ops = 3;             // Number of operations to perform and record (default: 1)
}

// Configuration for duration-based throughput benchmark mode.
// Runs operations in a while-loop for a fixed wall-clock duration, measuring
// how many operations complete (goodput). Used for Experiment 3:
//   Exp 3a (branch creation throughput): operations = [BRANCH]
//   Exp 3b (CRUD throughput under branching): operations = [READ, UPDATE, ...]
message ThroughputBenchmark {
    // Wall-clock duration in seconds for the measurement phase (e.g. 30).
    int32 duration_seconds = 1;

    // Operations to run in a random weighted mix during the benchmark.
    repeated OperationType operations = 2;

    // Optional setup: create branches before measurement phase.
    // Used for Exp 3b where N branches are pre-created with data.
    // If absent or num_branches=0, no pre-creation (Exp 3a).
    BenchmarkSetup setup = 3;
}

// Configuration for randomized average-cost benchmark mode
message RandomizedBenchmark {
    // Set of operation types to perform. Operations are selected randomly
    // based on weighted probabilities.
    repeated OperationType operations = 1;

    // Number of operations to perform. This should be set to a large enough
    // number to ensure that the benchmark performs all specified operations.
    int32 num_ops = 2;
}

// Configuration for a benchmark task
message TaskConfig {
  // Unique identifier for this benchmark run
  string run_id = 1;
  
  // Database backend to use
  Backend backend = 2;
  
  // Table to benchmark (empty means any random table from the schema)
  string table_name = 5;

  // The branch to start from.
  string starting_branch = 6;
  
  // Necessary setup for the database
  DatabaseSetup database_setup = 7;
  
  // Range update configuration
  RangeUpdateConfig range_update_config = 8;

  // Whether to autocommit pg transactions
  bool autocommit = 10;

  // Number of worker threads for parallel benchmark execution (default: 1)
  int32 num_threads = 11;

  // Whether to measure storage (disk_size_before/after) around each update operation.
  // When enabled, update and range_update ops will record per-op storage deltas.
  bool measure_storage = 14;

  // Benchmark mode: either randomized average-cost or deterministic Nth operation.
  oneof benchmark_mode {
    // Randomized mode: runs multiple random operations and measures average cost.
    RandomizedBenchmark randomized_benchmark = 12;

    // Nth-op mode: performs deterministic setup (branches + data) then measures
    // the cost of a single specified operation.
    NthOperationBenchmark nth_op_benchmark = 13;

    // Throughput mode: runs operations for a fixed duration and measures goodput.
    ThroughputBenchmark throughput_benchmark = 15;
  }
}

